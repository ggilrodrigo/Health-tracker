<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#F2EAD8"/>
  <!-- Decorative border -->
  <rect x="20" y="20" width="472" height="472" rx="85" fill="none" stroke="#6E1A28" stroke-width="6" opacity="0.3"/>
  <!-- R G monogram in Cormorant style — drawn as paths -->
  <!-- Large decorative R -->
  <text x="256" y="310" text-anchor="middle"
    font-family="Georgia, serif" font-size="280" font-style="italic" font-weight="400"
    fill="#6E1A28" opacity="0.85" letter-spacing="-8">RG</text>
  <!-- thin rule under -->
  <line x1="80" y1="360" x2="432" y2="360" stroke="#C8A878" stroke-width="3" opacity="0.6"/>
  <!-- small label -->
  <text x="256" y="400" text-anchor="middle"
    font-family="Georgia, serif" font-size="36" font-style="normal" font-weight="400"
    fill="#9E6E28" opacity="0.7" letter-spacing="8">HEALTH</text>
</svg>
